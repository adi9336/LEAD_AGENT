# Render infrastructure-as-code (Blueprint).
# Deploy: push repo to GitHub -> Render -> New -> Blueprint -> connect repo.
#
# This is a CRON-JOB deployment (not a 24/7 web service). Every hour the job:
#   1. fetches leads that still need scoring from monday.com
#   2. scores each with the LLM (retried with backoff for a REAL score)
#   3. writes the result back to monday + alerts you on WhatsApp
# Then it exits. No always-on server, no Redis, no Postgres add-on -> cheapest.
#
# Note: monday is the system of record. The scored/unscored state lives in the
# board's Status column, which fetch_due_leads reads each run, so the local
# SQLite file is only an audit log (safe to be ephemeral between runs).

cronJobs:
  - name: lead-agent-cron
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Standard cron schedule: run at minute 0 of every hour.
    schedule: "0 * * * *"
    # The image's CMD runs uvicorn by default; override it for the cron run.
    command: ["sh", "-c", "python scripts/cron_run.py"]
    envVars:
      - key: ADAPTER_MODE
        value: live
      - key: ALERT_PROVIDER
        value: whatsapp
      - key: USE_LLM
        sync: false          # auto: on if OPENAI_API_KEY set
      - key: OPENAI_API_KEY
        sync: false
      - key: MONDAY_API_TOKEN
        sync: false
      - key: MONDAY_BOARD_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_URL
        value: https://graph.facebook.com/v19.0
      - key: ALERT_RECIPIENT_PHONE
        sync: false
      - key: REVIEWER_PHONE
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: LEAD_AGENT
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_ENDPOINT
        value: https://api.smith.langchain.com
      # No DATABASE_URL / REDIS_URL -> SQLite default (audit log only).
