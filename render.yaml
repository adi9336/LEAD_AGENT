# Render infrastructure-as-code (Blueprint).
# Deploy: push repo to GitHub -> Render -> New -> Blueprint -> connect repo.
#
# This Blueprint defines TWO resources from one image:
#
#  1. lead-agent-cron (CRON JOB, under `jobs:`) — runs hourly:
#       - fetches leads needing scoring from monday.com
#       - scores each with the LLM (retried with backoff for a REAL score)
#       - writes the result back to monday + alerts you on WhatsApp
#     Then it exits. No always-on server, no Redis, no Postgres -> cheapest.
#
#  2. lead-agent-web (WEB SERVICE, under `services:`) — a public URL
#     serving the live dashboard (/dashboard). It reads straight from monday
#     (the system of record) so it shows real leads even though cron + web
#     run in separate containers with separate SQLite files.
#
# monday is the system of record. The scored state lives in the board's
# Status column, which fetch_due_leads reads each run, so the local
# SQLite file is only an audit log (safe to be ephemeral between runs).

# ---- Cron job: Render uses `jobs:` with `type: cron` ----------
jobs:
  - name: lead-agent-cron
    type: cron
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # Standard cron schedule: run at minute 0 of every hour.
    schedule: "0 * * * *"
    # Render cron jobs use `startCommand` (not `command`). Plain string.
    startCommand: "python scripts/cron_run.py"
    envVars:
      - key: ADAPTER_MODE
        value: live
      - key: ALERT_PROVIDER
        value: whatsapp
      - key: USE_LLM
        sync: false          # auto: on if OPENAI_API_KEY set
      - key: OPENAI_API_KEY
        sync: false
      - key: MONDAY_API_TOKEN
        sync: false
      - key: MONDAY_BOARD_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_URL
        value: https://graph.facebook.com/v19.0
      - key: ALERT_RECIPIENT_PHONE
        sync: false
      - key: REVIEWER_PHONE
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: LEAD_AGENT
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGSMITH_ENDPOINT
        value: https://api.smith.langchain.com
      # No DATABASE_URL / REDIS_URL -> SQLite default (audit log only).

# ---- Web service: public dashboard --------------------------------
services:
  - name: lead-agent-web
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    # Serve the FastAPI app (dashboard) instead of running the cron.
    envVars:
      - key: ROLE
        value: web
      - key: ADAPTER_MODE
        value: live
      - key: USE_LLM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MONDAY_API_TOKEN
        sync: false
      - key: MONDAY_BOARD_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: ALERT_RECIPIENT_PHONE
        sync: false
      - key: REVIEWER_PHONE
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: LEAD_AGENT
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGSMITH_ENDPOINT
        value: https://api.smith.langchain.com
