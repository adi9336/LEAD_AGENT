# Render Blueprint (infrastructure-as-code).
# Deploy: push repo to GitHub -> Render -> New -> Blueprint -> connect repo.
#
# ONLY ONE resource now: a FREE web service serving the FastAPI app.
#
#   lead-agent-web  (WEB SERVICE, plan: free) — public URL serving the live
#       dashboard (/dashboard) AND the /api/cron trigger endpoint.
#
# The hourly batch is NO LONGER a paid worker. It is triggered by a FREE
# external scheduler: .github/workflows/hourly-cron.yml (GitHub Actions,
# `schedule: '0 * * * *'`) curls https://<your-app>.onrender.com/api/cron
# every hour. GitHub Actions free tier (2000 min/mo) easily covers this, so
# the whole thing runs at ZERO cost — no paid worker, no Pro plan needed.
#
# monday is the system of record; local SQLite is only an audit log.

services:
  # ---- Web service: public dashboard + cron trigger (FREE) ----------
  - name: lead-agent-web
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ADAPTER_MODE
        value: live
      - key: USE_LLM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MONDAY_API_TOKEN
        sync: false
      - key: MONDAY_BOARD_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE
        value: lead_alert
      - key: WHATSAPP_TEMPLATE_HAS_VAR
        value: "true"
      - key: WHATSAPP_TEMPLATE_VAR
        value: lead_message
      - key: ALERT_RECIPIENT_PHONE
        sync: false
      - key: REVIEWER_PHONE
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: LEAD_AGENT
      - key: LANGCHAIN_TRACING
        value: "true"
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGSMITH_ENDPOINT
        value: https://api.smith.langchain.com
    # No DATABASE_URL / REDIS_URL -> SQLite default (audit log only).
