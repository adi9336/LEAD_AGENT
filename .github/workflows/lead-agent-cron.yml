name: lead-agent-cron

# ── FREE hourly runner (no Render, no credit card) ───────────────────────
# Runs scripts/cron_run.py every hour via GitHub Actions' free tier
# (2,000 free minutes/month; ~60 min/month for hourly 1-min runs).
# Secrets are pulled from repo Settings -> Secrets and variables -> Actions.
# The cron job + web dashboard logic is UNCHANGED — only the *runner* moved.

on:
  schedule:
    # ── Every hour at minute 5 (avoids :00 contention) ──
    - cron: "5 * * * *"
  # Allow a manual "Run workflow" button from the Actions tab.
  workflow_dispatch:

jobs:
  score-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lead scoring + WhatsApp alerts
        env:
          ADAPTER_MODE: live
          ALERT_PROVIDER: whatsapp
          USE_LLM: ${{ secrets.USE_LLM }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_API_URL: https://graph.facebook.com/v19.0
          WHATSAPP_TEMPLATE: lead_alert
          WHATSAPP_TEMPLATE_HAS_VAR: "true"
          WHATSAPP_TEMPLATE_VAR: lead_message
          ALERT_RECIPIENT_PHONE: ${{ secrets.ALERT_RECIPIENT_PHONE }}
          REVIEWER_PHONE: ${{ secrets.REVIEWER_PHONE }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: LEAD_AGENT
          LANGSMITH_TRACING: "true"
          LANGCHAIN_TRACING_V2: "true"
          LANGSMITH_ENDPOINT: https://api.smith.langchain.com
        run: |
          python scripts/cron_run.py
